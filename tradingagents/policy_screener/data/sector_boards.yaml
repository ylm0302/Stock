# 行业板块推荐映射表
# 按"国家政策扶持 + 主力介入少"筛选 A 股板块成分股。
#
# 结构：categories（大类）→ 每类下多个 board（板块）
# - board:  东财概念板块名（优先标准名）。运行时会做模糊匹配：
#           若精确名拉不到成分股，自动用 keywords 在东财全部板块中
#           模糊匹配最接近的一个，再拉成分股。
# - keywords: 模糊匹配用的关键词（含该词的板块视为候选）
# - funds:    相关 ETF/基金代码（6位，可选）
#
# 用户可自行增删改。新增板块时至少填 board + keywords。

